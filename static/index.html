<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 카메라 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glass"></div>
    <div class="container">
        <div class="card">
            <h1>📷 출석 카메라 예약</h1>
            <p class="subtitle">지정된 시간에 카메라 이미지를 변경합니다.</p>
            
            <form id="scheduleForm">
                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="이미지 파일명과 동일해야 함 (예: 홍길동)" required>
                </div>
                
                <div class="row">
                    <div class="input-group">
                        <label for="date">날짜</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-group">
                        <label for="time">시간</label>
                        <div class="time-container">
                            <input type="time" id="time" required class="time-input">
                            <input type="number" id="second" min="0" max="59" placeholder="초" required class="sec-input" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(-2)">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>유형</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="type" value="출근" checked>
                            <span class="radio-custom"></span>
                            출근
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="type" value="퇴근">
                            <span class="radio-custom"></span>
                            퇴근
                        </label>
                    </div>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">예약하기</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
            
            <div id="message" class="message"></div>
        </div>

        <div class="card status-card">
            <h2>📅 예약 현황</h2>
            <div class="tab-bar">
                <button class="tab active" data-type="출근" onclick="switchTab('출근')">🟢 출근</button>
                <button class="tab" data-type="퇴근" onclick="switchTab('퇴근')">🔴 퇴근</button>
                <button class="tab" data-type="전체" onclick="switchTab('전체')">📋 전체</button>
            </div>
            <div id="reservationList" class="reservation-list">
                <div class="empty-state">예약된 내역이 없습니다.</div>
            </div>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2>📝 예약 수정</h2>
            <input type="hidden" id="editId">
            <div class="input-group">
                <label for="editName">이름</label>
                <input type="text" id="editName" required>
            </div>
            <div class="row">
                <div class="input-group">
                    <label for="editDate">날짜</label>
                    <input type="date" id="editDate" required>
                </div>
                <div class="input-group">
                    <label for="editTime">시간</label>
                    <div class="time-container">
                        <input type="time" id="editTime" required class="time-input">
                        <input type="number" id="editSecond" min="0" max="59" placeholder="초" required class="sec-input" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(-2)">
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>유형</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="editType" value="출근" checked>
                        <span class="radio-custom"></span>출근
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="editType" value="퇴근">
                        <span class="radio-custom"></span>퇴근
                    </label>
                </div>
            </div>
            <div class="modal-buttons">
                <button onclick="saveEdit()" class="btn-save">저장</button>
                <button onclick="closeModal()" class="btn-cancel">취소</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
